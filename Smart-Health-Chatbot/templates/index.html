<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Health Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">🤖 Smart Health Chatbot</div>
    <div class="chat-box" id="chat-box">
      <div class="bot-message">Hello! 👋 Enter your symptoms (comma-separated), and I'll predict your possible disease.</div>
    </div>

    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type symptoms here...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
